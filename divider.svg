<svg width="800" height="60" viewBox="0 0 800 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00d9ff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.8" />
      <stop offset="80%" style="stop-color:#00d9ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <line x1="0" y1="30" x2="800" y2="30" stroke="url(#cyberGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <circle cx="100" cy="30" r="4" fill="#00d9ff" opacity="0.8" filter="url(#glow)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="250" cy="30" r="3" fill="#ff00ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="400" cy="30" r="5" fill="#00d9ff" opacity="0.9" filter="url(#glow)">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="550" cy="30" r="3" fill="#ff00ff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="700" cy="30" r="4" fill="#00d9ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <text x="400" y="50" text-anchor="middle" fill="#00d9ff" font-family="monospace" font-size="10" opacity="0.6">
    ◄ SYSTEM READY // AWAITING INPUT ►
  </text>
</svg>
