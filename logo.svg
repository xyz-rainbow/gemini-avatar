<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008888;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#cyanGrad)" stroke-width="4" />
  <!-- Abstract M/G Shape -->
  <path d="M60 140V60L100 100L140 60V140" stroke="cyan" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" from="0,400" to="400,0" dur="3s" repeatCount="indefinite" />
  </path>
  <!-- Inner Detail -->
  <circle cx="100" cy="100" r="10" fill="cyan" opacity="0.5">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
