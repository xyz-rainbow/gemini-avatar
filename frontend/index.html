<!DOCTYPE html>

#xyz-rainbow #xyz-rainbowtechnology #rainbowtechnology.xyz #rainbow.xyz #rainbow@rainbowtechnology.xyz

-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Avatar | Makima</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main-container">
        <!-- Ventana de Pensamientos (Cian Superior) -->
        <div id="thought-box" class="hidden">
            <div class="thought-header" data-i18n="thought_header">PENSAMIENTO INTERNO</div>
            <span id="thought-text"></span>
        </div>

        <!-- Controles de ventana -->
        <div id="window-controls">
            <button id="open-settings-panel" title="Configuración">⚙️</button>
            <button id="minimize-avatar-window" title="Minimizar">_</button>
            <button id="close-avatar-window" title="Cerrar">×</button>
        </div>

        <div id="rec-indicator">
            <div class="rec-dot"></div>
            <span>LIVE</span>
        </div>

        <!-- Panel de Configuración -->
        <div id="settings-modal" class="hidden">
            <div class="settings-content">
                <div class="settings-header">
                    <h2 data-i18n="settings_title">Ajustes</h2>
                    <button id="close-settings" title="Cerrar">×</button>
                </div>
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="ai-tab" data-i18n="tab_ai">IA</button>
                    <button class="tab-btn" data-tab="anim-tab" data-i18n="tab_anim">Transiciones</button>
                    <button class="tab-btn" data-tab="prompt-tab" data-i18n="tab_prompt">Personalidad</button>
                </div>
                
                <div class="tab-content active" id="ai-tab">
                    <div class="form-group">
                        <label data-i18n="lang_label">Idioma:</label>
                        <select id="app-language">
                            <option value="es">Español</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="ollama_url_label">URL de Ollama:</label>
                        <input type="text" id="ollama-url">
                    </div>
                    <div class="form-group">
                        <label data-i18n="ollama_model_label">Modelo Local:</label>
                        <select id="ollama-model-select"><option>...</option></select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="thought_mode_label">Modo de Pensamiento:</label>
                        <select id="thought-mode">
                            <option value="none" data-i18n="thought_mode_none">Desactivado</option>
                            <option value="short" data-i18n="thought_mode_short">Breve</option>
                            <option value="deep" data-i18n="thought_mode_deep">Profundo</option>
                            <option value="creative" data-i18n="thought_mode_creative">Creativo</option>
                        </select>
                    </div>
                </div>

                <div class="tab-content" id="anim-tab">
                    <div class="form-group">
                        <label data-i18n="transition_style_label">Estilo de transición:</label>
                        <select id="transition-style">
                            <option value="crossout" data-i18n="style_crossout">Crossout</option>
                            <option value="fade" data-i18n="style_fade">Fade</option>
                            <option value="cut" data-i18n="style_cut">Corte</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="transition_duration_label">Duración (segundos):</label>
                        <div class="stepper">
                            <button id="trans-dec" class="stepper-btn">-0.1</button>
                            <input type="number" id="transition-duration" step="0.1" readonly>
                            <button id="trans-inc" class="stepper-btn">+0.1</button>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="prompt-tab">
                    <div class="form-group">
                        <label data-i18n="system_prompt_label">System Prompt:</label>
                        <textarea id="system-prompt" rows="5"></textarea>
                    </div>
                </div>

                <div class="settings-footer">
                    <button id="save-settings" class="btn-primary" data-i18n="save_btn">Aplicar Cambios</button>
                </div>
            </div>
        </div>

        <div id="subtitle-box">
            <span id="subtitle-text"></span>
        </div>

        <div id="video-container">
            <video id="video-bg" class="avatar-video" autoplay loop muted playsinline poster="Makima.webp">
                <source src="avatar/makima_neutral.webm" type="video/webm">
            </video>
            <video id="video-fg" class="avatar-video active" autoplay loop muted playsinline poster="Makima.webp">
                <source src="avatar/makima_neutral.webm" type="video/webm">
            </video>
        </div>

        <div id="chat-container">
            <input type="text" id="chat-input" placeholder="...">
        </div>

        <div class="scanline"></div>
        <div class="noise"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
